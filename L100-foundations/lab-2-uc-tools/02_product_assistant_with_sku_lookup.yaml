# Pedagogical step file for lab 2.
# yaml-language-server: $schema=../../../dao-ai/schemas/model_config_schema.json
#
# Lab 2 - Step 2: sku_lookup
# --------------------------
# Capability: a product assistant that can look up real products by SKU.
#
# Adds (vs step 1):
#   - schemas:                  the UC catalog/schema the function lives in
#   - resources.functions:      registers a UC function as a dao-ai resource
#   - tools:                    binds that resource as a callable tool
#   - agent.tools:              gives the agent access to the tool
#   - unity_catalog_functions:  provisioning entry — runs DDL on .create()
#   - datasets:                 seeds the table the function reads from
#
# These five concepts (schema → resource → tool → agent.tools +
# provisioning blocks) are reused by every later lab that grounds the
# agent in workspace data. Lab 3 swaps the UC function for a Genie tool;
# Lab 4 swaps it for MCP auto-discovery; Lab 6 swaps it for vector search.
#
# Now SKU questions get a real answer; category questions still
# fall back to prompt knowledge. Step 3 fixes that.

parameters:
  username:
    description: Per-student username for unique deployment names. Auto-set by the notebook.
    # No default => required.
  catalog:
    description: Unity Catalog catalog containing the workshop tables/functions.
    # No default => required.
  schema:
    description: Schema within the catalog for workshop assets.
    default: dao_ai
  llm_endpoint:
    description: Databricks LLM serving endpoint name.
    default: databricks-claude-sonnet-4-5

# NEW in step 2 (vs step 1): schemas block.
# A `schema` is the (catalog, schema) pair where workshop assets live --
# UC functions, tables, vector-store source tables, prompts, etc. dao-ai
# uses this for both lookup (resolving function/table names) and
# provisioning (the .create() loop in the notebook).
schemas:
  workshop_schema: &workshop_schema
    catalog_name: ${var.catalog}
    schema_name: ${var.schema}

resources:
  llms:
    default_llm: &default_llm
      name: ${var.llm_endpoint}
      temperature: 0.1
      max_tokens: 4096

  # NEW in step 2: resources.functions
  # Registers a UC SQL function by (schema, name). At deploy time the
  # function gets attached to the served model / app as a Databricks
  # resource so the runtime identity has EXECUTE on it. The actual
  # SQL DDL is in unity_catalog_functions: below.
  functions:
    find_product_by_sku: &find_product_by_sku
      schema: *workshop_schema
      name: find_product_by_sku

# NEW in step 2: tools block.
# A `tool` wraps a resource into something the LLM can call. dao-ai
# supports several tool types:
#   type: unity_catalog -- wraps a UC function (this lab)
#   type: factory       -- runs a Python factory (vector search, REST, etc.)
#   type: mcp           -- a Managed MCP server (Lab 4)
#   type: genie         -- a Genie space (Lab 3)
# The `name:` is what the LLM sees and what gets logged into traces.
tools:
  sku_lookup_tool: &sku_lookup_tool
    name: find_product_by_sku
    function:
      type: unity_catalog
      resource: *find_product_by_sku

agents:
  product_agent: &product_agent
    name: product_agent
    description: Answers SKU questions using a UC function; chats about everything else.
    model: *default_llm
    # NEW in step 2: agent.tools list. The agent gets one tool now;
    # in step 1 the agent had no tools at all.
    tools:
      - *sku_lookup_tool
    prompt: |
      You are a product assistant for a small hardware store.
      You have one tool:
        - find_product_by_sku: look up one or more products by SKU.

      Rules:
        - If the user gives a SKU, call find_product_by_sku.
        - If the user asks about a category, you don't yet have a tool
          for that -- be honest and say so.
        - Summarize results in plain language. Include price and stock.

app:
  name: hardware-store-${var.username}
  description: "Workshop lab 2 - step 2: sku_lookup"
  log_level: INFO
  deployment_target: apps
  agents:
    - *product_agent
# NEW in step 2: provisioning blocks.
# `unity_catalog_functions` and `datasets` describe how dao-ai
# **materializes** workspace state from local DDL files. The notebook
# iterates these and calls `.create()` on each. Both are idempotent --
# safe to re-run every time the notebook executes.
#
# This is the dao-ai equivalent of `terraform apply` for workshop assets:
# it lets a lab be self-contained (no manual SQL setup), and is reused
# by Lab 4 (also UC functions), Lab 6 (kb_articles dataset), Lab 11
# (extended products dataset), Lab 13 (programmatic equivalents).
unity_catalog_functions:
  - function: *find_product_by_sku
    ddl: ./functions/find_product_by_sku.sql
    test:
      parameters:
        sku: ["SKU-0001"]

datasets:
  - table:
      schema: *workshop_schema
      name: products
    ddl: ./data/products.sql
    format: sql
