# yaml-language-server: $schema=../../../dao-ai/schemas/model_config_schema.json
#
# Lab 6 - Step 2: kb_assistant_with_search
# --------------------------------------------
# Capability: a support assistant that retrieves real KB articles by
# semantic similarity. Adds (vs step 1):
#   - schemas: workshop_schema
#   - resources.llms.embedding_model
#   - resources.vector_stores.kb_vs
#   - retrievers.kb_retriever
#   - tools.kb_search via create_vector_search_tool
#   - datasets seed for kb_articles

parameters:
  username:
    description: Per-student username for unique deployment names. Auto-set by the notebook.
    # No default => required.
  catalog:
    description: Unity Catalog catalog containing the KB articles table.
    # No default => required.
  schema:
    description: Schema within the catalog for workshop assets.
    default: dao_ai
  llm_endpoint:
    description: Databricks LLM serving endpoint name.
    default: databricks-claude-sonnet-4-5
  embedding_model:
    description: Foundation-model embedding endpoint name.
    default: databricks-gte-large-en
  vector_search_endpoint:
    description: Vector Search endpoint name (must already exist).
    default: dao_ai_workshop_vs

# NEW in step 2 (vs step 1): schemas block. The vector store and
# its source table both bind to this schema via *workshop_schema.
schemas:
  workshop_schema: &workshop_schema
    catalog_name: ${var.catalog}
    schema_name: ${var.schema}

resources:
  llms:
    default_llm: &default_llm
      name: ${var.llm_endpoint}
      temperature: 0.1
      max_tokens: 4096

    # NEW in step 2: embedding_model -- the FM endpoint that produces
    # the vectors stored in the index.
    embedding_model: &embedding_model
      name: ${var.embedding_model}

  # NEW in step 2: vector_stores block. dao-ai provisions the index
  # from `source_table` if it doesn't exist; otherwise it's reused.
  vector_stores:
    kb_vs: &kb_vs
      embedding_model: *embedding_model
      endpoint:
        name: ${var.vector_search_endpoint}
      index:
        schema: *workshop_schema
        name: kb_articles_index
      source_table:
        schema: *workshop_schema
        name: kb_articles
      primary_key: article_id
      embedding_source_column: body
      columns:
        - article_id
        - title
        - topic
        - body
        - published_at

# NEW in step 2: retrievers wraps the vector store with the search
# parameters the agent will actually use at query time.
retrievers:
  kb_retriever: &kb_retriever
    vector_store: *kb_vs
    columns: [article_id, title, topic, body]
    search_parameters:
      num_results: 5
      query_type: ANN

# NEW in step 2: tools block. `factory` tools call a Python factory
# (here `create_vector_search_tool`) that builds a LangChain tool
# from the retriever above.
tools:
  kb_search: &kb_search
    name: kb_search
    function:
      type: factory
      name: dao_ai.tools.create_vector_search_tool
      args:
        retriever: *kb_retriever
        name: kb_search
        description: >
          Semantic search over the support knowledge base. Use for
          how-to questions, error diagnostics, and policy lookups.

agents:
  kb_assistant: &kb_assistant
    name: kb_assistant
    description: A support assistant grounded in the KB via semantic search.
    model: *default_llm
    # NEW in step 2: agent.tools list (step 1 had no tools).
    tools:
      - *kb_search
    prompt: |
      You are a tier-1 support assistant. When a customer asks a
      how-to or troubleshooting question, call kb_search to find
      relevant KB articles, then summarize the answer in plain
      language. Cite the KB article title.

app:
  name: saas-helpdesk-${var.username}
  description: "Workshop lab 6 - step 2: kb_assistant_with_search"
  log_level: INFO
  deployment_target: apps
  agents:
    - *kb_assistant
# NEW in step 2: datasets block seeds the kb_articles table dao-ai
# uses as the vector store's source. Step 1 had no grounded data.
datasets:
  - table:
      schema: *workshop_schema
      name: kb_articles
    ddl: ./data/kb_articles.sql
    format: sql
