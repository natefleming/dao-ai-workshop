# yaml-language-server: $schema=../../../dao-ai/schemas/model_config_schema.json
#
# Chapter 6 - Step 3: kb_assistant_with_reranking (FINAL)
# -------------------------------------------------------
# Capability: ANN + cross-encoder reranking. Adds (vs step 2):
#   - retriever.search_parameters.num_results: 50 (wider net)
#   - retriever.rerank: block (FlashRank cross-encoder)
#   - top_n: 5 final results after rerank

parameters:
  username:
    description: Per-student username for unique deployment names. Auto-set by the notebook.
    # No default => required.
  catalog:
    description: Unity Catalog catalog containing the KB articles table.
    # No default => required.
  schema:
    description: Schema within the catalog for workshop assets.
    default: dao_ai
  llm_endpoint:
    description: Databricks LLM serving endpoint name.
    default: databricks-claude-sonnet-4-5
  embedding_model:
    description: Foundation-model embedding endpoint name.
    default: databricks-gte-large-en
  vector_search_endpoint:
    description: Vector Search endpoint name (must already exist).
    default: dao_ai_workshop_vs
  reranker_model:
    description: FlashRank cross-encoder model.
    default: ms-marco-MiniLM-L-12-v2

schemas:
  workshop_schema: &workshop_schema
    catalog_name: ${var.catalog}
    schema_name: ${var.schema}

resources:
  llms:
    default_llm: &default_llm
      name: ${var.llm_endpoint}
      temperature: 0.1
      max_tokens: 4096

    embedding_model: &embedding_model
      name: ${var.embedding_model}

  vector_stores:
    kb_vs: &kb_vs
      # On-Behalf-Of-User: queries against this index run as the
      # caller (Databricks Apps forwards x-forwarded-access-token,
      # Model Serving uses ModelServingUserCredentials). With OBO
      # the agent only ever returns rows the calling user has UC
      # SELECT on; without OBO the app's service principal would
      # see every row.
      on_behalf_of_user: true
      embedding_model: *embedding_model
      endpoint:
        name: ${var.vector_search_endpoint}
      index:
        schema: *workshop_schema
        name: kb_articles_index
      source_table:
        schema: *workshop_schema
        name: kb_articles
      primary_key: article_id
      embedding_source_column: body
      columns:
        - article_id
        - title
        - topic
        - body
        - published_at

retrievers:
  kb_retriever: &kb_retriever
    vector_store: *kb_vs
    columns: [article_id, title, topic, body]
    search_parameters:
      num_results: 50
      query_type: ANN
    rerank:
      model: ${var.reranker_model}
      top_n: 5

tools:
  kb_search: &kb_search
    name: kb_search
    function:
      type: factory
      name: dao_ai.tools.create_vector_search_tool
      args:
        retriever: *kb_retriever
        name: kb_search
        description: >
          Semantic search with cross-encoder reranking over the
          support knowledge base. Returns the top 5 most relevant
          articles for a natural-language query.

agents:
  kb_assistant: &kb_assistant
    name: kb_assistant
    description: A support assistant grounded in the KB via reranked semantic search.
    model: *default_llm
    tools:
      - *kb_search
    prompt: |
      You are a tier-1 support assistant. When a customer asks a
      how-to or troubleshooting question, call kb_search to find
      relevant KB articles. The retriever already reranks results
      for precision -- trust the order it returns and cite the top
      article(s) that match the question.

app:
  name: kb-search-${var.username}
  description: "Workshop chapter 6: KB search with cross-encoder reranking"
  log_level: INFO
  deployment_target: apps
  agents:
    - *kb_assistant
  orchestration:
    swarm:
      default_agent: *kb_assistant
  input_example:
    messages:
      - role: user
        content: "How do I rotate my API keys without downtime?"

datasets:
  - table:
      schema: *workshop_schema
      name: kb_articles
    ddl: ./data/kb_articles.sql
    format: sql
