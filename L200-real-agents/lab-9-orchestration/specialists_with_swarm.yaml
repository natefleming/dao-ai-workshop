# yaml-language-server: $schema=../../../dao-ai/schemas/model_config_schema.json
#
# Chapter 9 - Swarm with Mixed Deterministic + Agentic Handoffs (saas_helpdesk)
# -----------------------------------------------------------------------------
# Three specialists. tier-1 routes agentically to either tier-2 or
# escalation; tier-2 always (deterministic) escalates after its turn so
# every technical fix goes through a manager review; escalation is the
# terminal node.
#
# DAO-AI 0.1.62+ rejects deterministic edges that participate in a
# cycle, so this is the only safe way to mix the two patterns: keep
# the deterministic edge in an acyclic position (no path back to its
# source). Adding `escalation_lead -> tier2_engineer` (agentic or
# deterministic) here would make config load fail with a clear error.
#
# Flow:
#   tier1_support (default entry)
#     ├── agentic → tier2_engineer       (LLM picks if technical)
#     └── agentic → escalation_lead      (LLM picks if billing/policy)
#   tier2_engineer
#     └── deterministic → escalation_lead   (every tier-2 case is reviewed)
#   escalation_lead                          (terminal — no outgoing handoffs)

parameters:
  username:
    description: Per-student username for unique deployment names. Auto-set by the notebook.
    # No default => required.
  llm_endpoint:
    description: Primary LLM endpoint (escalation_lead).
    default: databricks-claude-sonnet-4-5
  fast_llm_endpoint:
    description: Faster/smaller LLM endpoint (tier1_support triage).
    default: databricks-claude-haiku-4-5
  technical_llm_endpoint:
    description: LLM endpoint for tier2_engineer technical work.
    default: databricks-meta-llama-3-1-8b-instruct

resources:
  llms:
    default_llm: &default_llm
      name: ${var.llm_endpoint}
      temperature: 0.2
      max_tokens: 4096

    fast_llm: &fast_llm
      name: ${var.fast_llm_endpoint}
      temperature: 0.2
      max_tokens: 2048

    technical_llm: &technical_llm
      name: ${var.technical_llm_endpoint}
      temperature: 0.2
      max_tokens: 4096

agents:
  tier1_support: &tier1_support
    name: tier1_support
    description: Front-line triage agent.
    model: *fast_llm
    prompt: |
      You are the front-desk triage agent for SaaS support. Classify
      the customer's question:
        - If it's a bug, error, or integration issue, control passes
          to tier-2 engineering.
        - If it's a refund, credit, or contract exception, control
          passes to escalation.
      Keep your response to one sentence of classification.
    handoff_prompt: |
      Initial triage of incoming customer questions.

  tier2_engineer: &tier2_engineer
    name: tier2_engineer
    description: Technical specialist for bugs and integration errors.
    model: *technical_llm
    prompt: |
      You are tier-2 technical support. Handle bugs, errors, broken
      integrations. If the customer needs a refund or credit, hand
      off to the escalation lead.
    handoff_prompt: |
      Bugs, error messages, integration failures, performance issues.

  escalation_lead: &escalation_lead
    name: escalation_lead
    description: Senior agent for refunds, credits, and exceptions.
    model: *default_llm
    prompt: |
      You are the escalation lead. Handle refunds, credits, contract
      exceptions, complex disputes. If the customer needs a technical
      diagnostic to back the request, hand off to tier-2.
    handoff_prompt: |
      Refunds, credits, contract exceptions, billing disputes.

app:
  name: saas-helpdesk-${var.username}
  description: "Workshop chapter 9: tier swarm with directed routes"
  log_level: INFO
  deployment_target: apps
  agents:
    - *tier1_support
    - *tier2_engineer
    - *escalation_lead

  orchestration:
    swarm:
      default_agent: tier1_support
      handoffs:
        # Agentic: triage LLM reads the customer's question and picks
        # one specialist on its own.
        tier1_support:
          - tier2_engineer
          - escalation_lead

        # Deterministic: every tier-2 case is forwarded to escalation
        # for manager review after the technical fix lands. The edge
        # is acyclic (escalation has no outgoing handoffs), so the
        # 0.1.62 cycle validator accepts it.
        tier2_engineer:
          - agent: escalation_lead
            is_deterministic: true

        # Terminal: escalation_lead has no outgoing handoffs. Adding
        # one back to tier2_engineer would form a cycle with the
        # deterministic edge above and AppConfig load would error.
        escalation_lead: []
